name: Build RinCore APK

on:
  push:
    branches: [ main, master, desk ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web-ui dependencies
        run: cd web-ui && pnpm install --no-frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          sdkmanager "ndk;28.2.13676358" 2>/dev/null || true

      - name: Create signing config
        run: |
          printf 'storeFile=../app/release.jks\nstorePassword=release123\nkeyAlias=rincore\nkeyPassword=release123\n' > local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rincore-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
